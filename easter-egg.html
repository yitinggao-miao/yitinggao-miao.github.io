<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#14201b">
    <title>I just miss you so much</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="easter-page">
    <main class="easter-main">
      <section class="easter-stage" aria-label="Easter egg photo slideshow">
        <img
          id="easter-carousel-image"
          src="easter%20egg/IMG_8895.JPEG"
          alt="Easter egg photo"
          data-photos="easter%20egg/IMG_8895.JPEG,easter%20egg/IMG_2473.JPG,easter%20egg/IMG_4583.JPG"
        >
        <div class="easter-message">
          <p>I just miss you so much</p>
        </div>
      </section>
    </main>

    <div id="reward-modal" class="reward-modal" role="dialog" aria-modal="true" aria-labelledby="reward-title" hidden>
      <div class="reward-card">
        <p class="reward-kicker">Special reward</p>
        <h1 id="reward-title">凭此兑换</h1>
        <p class="reward-amount">520</p>
        <p class="reward-copy">现金奖励</p>
        <button id="reward-close" class="reward-close" type="button">收下啦</button>
      </div>
    </div>

    <script src="easter-egg.js"></script>
  </body>
</html>
